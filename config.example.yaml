# Balam workspace contexts. Copy to config.yaml (repo root) and edit.
#
# Secrets and infra connection live in .env, NOT here — this file only defines
# the *contexts* the agent can work in. A context bundles a working directory
# with an optional model/effort and a tool permission profile. Each Telegram
# topic binds to one context; an unbound topic uses `default_context`.
#
# This file is REQUIRED: Balam will not boot without a config.yaml defining at
# least one context. Override the path with BALAM_CONFIG_PATH.

default_context: balam

contexts:
  balam:
    directory: /home/ubuntu/projects/balam
    description: "AI assistant"
    # model: anthropic/claude-opus-4-8   # optional; must be provider/model
    # effort: medium                     # optional: low | medium | high | xhigh | max
    allowed_tools:
      - LSP
      # Tools listed here are pre-approved: OpenCode runs them without prompting.
      # Reads inside `directory` are already auto-approved locally, so you don't
      # need to list Read/Glob/Grep. Opt into commands with a pattern, e.g.
      # "Bash(git *)". Listing "Edit"/"Write" pre-approves edits *inside* the
      # workspace (out-of-workspace edits still prompt); leave them off to keep
      # the per-edit approval prompt.
    # additional_directories:            # extra dirs the agent may read/edit
    #   - /home/ubuntu/projects/open-shrimp
    # mcp:                               # optional per-context MCP servers
    #   # Local (stdio) server — OpenCode spawns the command:
    #   my-db:
    #     type: local
    #     command: ["postgres-mcp", "--access-mode=restricted"]
    #     environment:
    #       DATABASE_URI: ${MY_DATABASE_URI}   # ${VAR} is filled from .env
    #   # Remote (http/sse) server:
    #   my-api:
    #     type: remote
    #     url: https://internal.example.com/mcp
    #     headers:
    #       Authorization: Bearer ${MY_API_TOKEN}
    # Secrets stay in .env (never here); reference them with ${VAR}. Servers
    # are registered with OpenCode before each of this context's sessions.

  # Add more workspaces as needed:
  # zog:
  #   directory: /home/ubuntu/projects/zog
  #   description: "AI assistant"
  #   allowed_tools: []
